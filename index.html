<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TabVerse - Distributed Physics</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/ui.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="theme-dark">
    <!-- Main Canvas -->
    <canvas id="worldCanvas"></canvas>

    <!-- UI Layer -->
    <div id="cyber-dashboard" class="cyber-panel">
        <header class="cyber-header">
            <h1 class="glitch" data-text="CYBER BOUNCE">CYBER BOUNCE</h1>
            <div id="status-indicator" class="cyber-status connecting">CONNECTING...</div>
        </header>

        <div class="cyber-score-board">
            <h2>SCORE</h2>
            <div id="score-display">0000</div>
        </div>

        <div class="cyber-stats">
            <div class="stat-row"><span>ROLE:</span> <span id="stat-role" class="neon-text">CLIENT</span></div>
            <div class="stat-row"><span>NODES:</span> <span id="stat-tabs" class="neon-text">1</span></div>
            <div class="stat-row"><span>ENTITIES:</span> <span id="stat-objects" class="neon-text">0</span></div>
            <div class="stat-row"><span>FPS:</span> <span id="stat-fps" class="neon-text">0</span></div>
        </div>

        <div class="cyber-controls">
            <button id="btn-start" class="cyber-btn">START SIMULATION</button>
            <button id="btn-quit" class="cyber-btn cyber-btn-danger">TERMINATE</button>
        </div>
    </div>

    <!-- Core -->
    <script type="module" src="js/main.ts"></script>
</body>
</html>
